"$schema" = "https://yazi-rs.github.io/schemas/yazi.json"

[mgr]
sort_by        = "mtime"
sort_reverse   = true
linemode       = "size_and_mtime"

[opener]
image = [
  { run = 'imv -n "$1" "$(dirname "$1")"', desc = "Open with imv", orphan = true, for = "unix" },
]

[plugin]
prepend_previewers = [
  { url = "*/", run = "eza-preview" },
]

[open]
prepend_rules = [
  { mime = "image/*", use = "image" },
]
